<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Novo Produto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">📦 Cadastro de Produtos</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="produtos.html">Produtos</a></li>
                <li><a href="cadastro.html" class="active">Novo Produto</a></li>
                <li><a href="sobre.html">Sobre</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="page-header">
            <h1>Cadastrar Novo Produto</h1>
        </section>

        <div class="form-container">
            <div id="success" class="alert alert-success" style="display: none;">
                Produto cadastrado com sucesso! <a href="produtos.html">Ver produtos</a>
            </div>

            <div id="error" class="alert alert-danger" style="display: none;"></div>

            <form id="form-produto">
                <div class="form-group">
                    <label for="nome">Nome do Produto *</label>
                    <input type="text" id="nome" name="nome" required placeholder="Ex: Notebook Dell">
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição *</label>
                    <textarea id="descricao" name="descricao" required placeholder="Descreva o produto..." rows="4"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="preco">Preço (R$) *</label>
                        <input type="number" id="preco" name="preco" required placeholder="2500.00" step="0.01" min="0">
                    </div>

                    <div class="form-group">
                        <label for="quantidade">Quantidade *</label>
                        <input type="number" id="quantidade" name="quantidade" required placeholder="5" min="0">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Cadastrar Produto</button>
                    <a href="produtos.html" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Sistema de Cadastro de Produtos. Todos os direitos reservados.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/cadastro.js"></script>
</body>
</html>
